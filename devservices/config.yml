# Ignored by docker compose, used by devservices
x-sentry-service-config:
  version: 0.1
  service_name: taskbroker
  dependencies:
    kafka:
      description: Shared instance of kafka used by sentry services
      remote:
        repo_name: sentry-shared-kafka
        branch: main
        repo_link: https://github.com/getsentry/sentry-shared-kafka
    redis:
      description: Shared instance of redis used by sentry services
      remote:
        repo_name: sentry-shared-redis
        branch: main
        repo_link: https://github.com/getsentry/sentry-shared-redis.git
    postgres:
      description: Shared instance of postgres used by sentry services
      remote:
        repo_name: sentry-shared-postgres
        branch: main
        repo_link: https://github.com/getsentry/sentry-shared-postgres.git
    taskbroker:
      description: Taskbroker service
  modes:
    default: [kafka, postgres]
    client: [kafka, redis, postgres]
    containerized: [kafka, redis, postgres, taskbroker]

x-programs:
  devserver:
    command: cargo run

services:
  taskbroker:
    image: ghcr.io/getsentry/taskbroker:nightly
    environment:
      # Multi-topic/cluster config expressed via env vars. Nested keys use the
      # "__" separator; figment lowercases each key segment, so topic/cluster
      # names can only contain underscores (not hyphens) when set this way.
      TASKBROKER_KAFKA_CLUSTERS__DEFAULT__ADDRESS: "kafka-kafka-1:9093"
      TASKBROKER_KAFKA_TOPICS__TASKWORKER__CLUSTER: "default"
      TASKBROKER_KAFKA_TOPICS__TASKWORKER__CONSUMER_GROUP: "taskworker"
      TASKBROKER_KAFKA_DEADLETTER_TOPIC: "taskworker_dlq"
      TASKBROKER_KAFKA_TOPICS__TASKWORKER_DLQ__CLUSTER: "default"
      TASKBROKER_KAFKA_TOPICS__TASKWORKER_DLQ__CONSUMER_GROUP: "taskworker"
      TASKBROKER_KAFKA_TOPICS__TASKWORKER_DLQ__PRODUCE_ONLY: "true"
      TASKBROKER_CREATE_MISSING_TOPICS: "true"
      TASKBROKER_GRPC_PORT: "50055"
    ports:
      - 127.0.0.1:50055:50055
    networks:
      - devservices
    labels:
      - orchestrator=devservices
    restart: unless-stopped
    platform: linux/amd64

networks:
  devservices:
    name: devservices
    external: true
